<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#14181F">
<title>NOTAS</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<style>
  :root{
    --bg:#14181F;
    --surface:#1B212B;
    --surface-2:#222936;
    --ink:#EDEFF2;
    --ink-dim:#9AA3B2;
    --amber:#E8A33D;
    --line:#2A3240;
    --mono: ui-monospace, "SF Mono", "Menlo", monospace;
    --sans: -apple-system, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:var(--sans); -webkit-font-smoothing:antialiased;
    padding-bottom:24px;
  }
  header{
    position:sticky; top:0; z-index:10;
    background:rgba(20,24,31,0.94); backdrop-filter:blur(8px);
    padding:14px 14px 10px; border-bottom:1px solid var(--line);
  }
  .brand{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .brand-left{ display:flex; align-items:baseline; gap:8px; }
  .brand .badge{ width:8px; height:8px; border-radius:50%; background:var(--amber); box-shadow:0 0 8px var(--amber);}
  .brand h1{ font-size:15px; font-weight:600; letter-spacing:0.04em; margin:0; font-family:var(--mono); color:var(--ink);}
  .brand .updated{ font-size:10px; color:var(--ink-dim); font-family:var(--mono);}
  .refresh-btn{
    background:var(--surface); border:1px solid var(--line); color:var(--ink-dim);
    font-size:11px; font-family:var(--mono); padding:6px 9px; border-radius:8px;
    display:flex; align-items:center; gap:5px;
  }
  .refresh-btn:active{ background:var(--surface-2); }
  .search{
    display:flex; align-items:center; gap:8px;
    background:var(--surface); border:1px solid var(--line);
    border-radius:10px; padding:10px 12px; margin-bottom:10px;
  }
  .search input{
    background:none; border:none; outline:none; color:var(--ink);
    font-size:14px; width:100%; font-family:var(--sans);
  }
  .search input::placeholder{ color:var(--ink-dim); }
  .search svg{flex-shrink:0; opacity:0.5;}

  .maintabs{ display:flex; gap:6px; margin-bottom:8px; }
  .maintab{
    flex:1; text-align:center; font-family:var(--mono); font-size:12px; padding:8px 10px;
    border-radius:8px; border:1px solid var(--line); color:var(--ink-dim); background:var(--surface);
  }
  .maintab.active{ background:var(--amber); color:#1A140A; border-color:var(--amber); font-weight:600;}

  .subtabs{ display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none;}
  .subtabs::-webkit-scrollbar{ display:none; }
  .subtab{
    flex-shrink:0; font-family:var(--mono); font-size:11px; padding:5px 10px;
    border-radius:7px; border:1px solid var(--line); color:var(--ink-dim); background:var(--surface);
    white-space:nowrap;
  }
  .subtab.active{ background:var(--surface-2); color:var(--amber); border-color:var(--amber); }

  main{ padding:12px 14px 90px; }

  .notas-list{ display:flex; flex-direction:column; gap:10px; }
  .note-row{ display:flex; align-items:stretch; gap:0; touch-action:pan-y; }
  .note-row.dragging{ opacity:0.85; }
  .note-row .card{ flex:1; margin-bottom:0; }
  .drag-handle{
    flex-shrink:0; width:34px; display:flex; align-items:center; justify-content:center;
    color:var(--ink-dim); font-size:18px; letter-spacing:-2px; cursor:grab; touch-action:none;
  }
  .drag-handle:active{ cursor:grabbing; color:var(--amber); }
  .note-row-placeholder{
    border:1.5px dashed var(--line); border-radius:12px; background:rgba(255,255,255,0.02);
  }

  .card{
    break-inside:avoid; margin-bottom:10px; border-radius:12px;
    border:1px solid var(--line); padding:12px; position:relative; overflow:hidden;
    background:var(--surface); cursor:pointer;
  }
  .card::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:#4A5468;}
  .card .head{ display:flex; justify-content:space-between; align-items:flex-start; gap:6px; margin-bottom:6px; flex-wrap:wrap;}
  .card .ent{ font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:0.03em; }
  .card .code{ font-family:var(--mono); font-size:10px; color:var(--ink-dim); }
  .card .title{ font-size:13.5px; font-weight:600; margin:0 0 4px; color:var(--ink);}
  .card .body{
    font-size:12.5px; line-height:1.5; color:#C7CDD8; word-break:break-word;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  }
  .card .meta{ display:flex; justify-content:space-between; align-items:center; margin-top:8px; flex-wrap:wrap; gap:4px;}
  .card .date{ font-size:10px; color:var(--ink-dim); font-family:var(--mono); }
  .card .chips{ display:flex; gap:4px; flex-wrap:wrap; }
  .card .chip{
    font-size:9.5px; font-family:var(--mono); padding:2px 6px; border-radius:5px;
    background:rgba(255,255,255,0.06); color:var(--ink-dim);
  }
  .local-badge{ font-size:10.5px; color:var(--amber); font-family:var(--mono); margin-left:5px; }

  /* entity colors */
  .ce-bbva::before{background:#3E7BFA;} .ce-bbva .ent{color:#3E7BFA;}
  .ce-cajamar::before{background:#6EC46B;} .ce-cajamar .ent{color:#6EC46B;}
  .ce-caixa::before{background:#E86A6A;} .ce-caixa .ent{color:#E86A6A;}
  .ce-orange::before{background:var(--amber);} .ce-orange .ent{color:var(--amber);}
  .ce-abanca::before{background:#B07EEA;} .ce-abanca .ent{color:#B07EEA;}
  .ce-repsol::before{background:#FF7A1A;} .ce-repsol .ent{color:#FF7A1A;}
  .ce-sprinter::before{background:#F27EB0;} .ce-sprinter .ent{color:#F27EB0;}
  .ce-dia::before{background:#E23744;} .ce-dia .ent{color:#E23744;}
  .ce-march::before{background:#8FA8E8;} .ce-march .ent{color:#8FA8E8;}
  .ce-jd::before{background:#9BD97D;} .ce-jd .ent{color:#9BD97D;}

  .empty{
    margin:60px 20px; text-align:center; color:var(--ink-dim);
  }
  .empty .icon{ font-size:36px; margin-bottom:10px; }
  .empty h2{ font-size:15px; color:var(--ink); font-family:var(--mono); margin:0 0 6px;}
  .empty p{ font-size:12.5px; line-height:1.5; margin:0 0 18px; }
  .bigbtn{
    background:var(--amber); color:#1A140A; border:none; font-weight:700;
    font-family:var(--mono); font-size:13px; padding:12px 20px; border-radius:10px;
  }
  .no-results{ text-align:center; color:var(--ink-dim); font-size:12.5px; font-family:var(--mono); padding:40px 20px;}

  #fileInputLibreta, #fileInputPropio{ display:none; }

  .fab{
    position:fixed; right:18px; bottom:22px; width:54px; height:54px; border-radius:50%;
    background:var(--amber); color:#1A140A; font-size:28px; font-weight:700; border:none;
    box-shadow:0 6px 16px rgba(0,0,0,0.45); z-index:30; display:flex; align-items:center; justify-content:center;
    line-height:1;
  }
  .fab:active{ transform:scale(0.95); }

  .fullview{
    position:fixed; inset:0; background:var(--bg); z-index:50;
    display:flex; flex-direction:column; animation:fv-in 0.16s ease-out;
  }
  @keyframes fv-in{ from{ opacity:0; transform:translateY(8px);} to{ opacity:1; transform:translateY(0);} }
  .fv-header{
    display:flex; align-items:center; gap:12px; padding:14px 14px 12px;
    border-bottom:1px solid var(--line); flex-shrink:0;
  }
  .fv-back{
    background:var(--surface); border:1px solid var(--line); color:var(--ink);
    width:34px; height:34px; border-radius:9px; font-size:16px; flex-shrink:0;
  }
  .fv-back:active{ background:var(--surface-2); }
  .fv-pencil{
    margin-left:auto; background:var(--surface); border:1px solid var(--line); color:var(--ink);
    width:34px; height:34px; border-radius:9px; font-size:15px; flex-shrink:0;
  }
  .fv-headtext{ min-width:0; }
  .fv-ent{ font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:0.03em; }
  .fv-sub{ font-size:10.5px; color:var(--ink-dim); font-family:var(--mono); margin-top:1px;}
  .fv-scroll{ flex:1; overflow-y:auto; padding:18px 18px 40px; }
  .fv-title{ font-size:19px; font-weight:700; margin:0 0 14px; line-height:1.35; }
  .fv-body{ font-size:15px; line-height:1.7; color:#DCE0E8; white-space:pre-wrap; word-break:break-word; }
  .fv-meta{ display:flex; flex-wrap:wrap; gap:6px; margin-top:22px; padding-top:14px; border-top:1px solid var(--line); }
  .fv-chip{
    font-size:11px; font-family:var(--mono); padding:4px 9px; border-radius:6px;
    background:rgba(255,255,255,0.06); color:var(--ink-dim);
  }
  .fv-date{ font-size:11px; color:var(--ink-dim); font-family:var(--mono); margin-top:22px; }

  .editor-field{ margin-bottom:16px; }
  .editor-label{ font-size:10.5px; font-family:var(--mono); color:var(--ink-dim); margin-bottom:6px; display:block; }
  .editor-input, .editor-textarea{
    width:100%; background:var(--surface); border:1px solid var(--line); border-radius:9px;
    padding:11px 12px; color:var(--ink); font-size:14.5px; font-family:var(--sans); outline:none;
  }
  .editor-input:focus, .editor-textarea:focus{ border-color:var(--amber); }
  .editor-textarea{ min-height:130px; resize:vertical; line-height:1.5; }
  .editor-actions{ display:flex; gap:10px; margin-top:6px; }
  .editor-save{
    flex:1; background:var(--amber); color:#1A140A; border:none; font-weight:700;
    font-family:var(--mono); font-size:13.5px; padding:12px; border-radius:10px;
  }
  .editor-cancel-btn{
    background:var(--surface); border:1px solid var(--line); color:var(--ink-dim);
    font-family:var(--mono); font-size:13.5px; padding:12px 16px; border-radius:10px;
  }
  .editor-delete{
    width:100%; text-align:center; background:none; border:none; color:#E86A6A;
    font-family:var(--mono); font-size:12.5px; padding:16px 0 4px;
  }

  .excel-modal-bg{
    position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:60;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .excel-modal{
    background:var(--surface); border:1px solid var(--line); border-radius:16px 16px 0 0;
    width:100%; max-width:480px; padding:18px; padding-bottom:28px;
  }
  .excel-modal h3{ font-size:13px; font-family:var(--mono); color:var(--ink-dim); margin:0 0 14px; text-align:center; letter-spacing:0.05em;}
  .excel-option{
    display:flex; align-items:center; gap:12px; width:100%; text-align:left;
    background:var(--surface-2); border:1px solid var(--line); border-radius:10px;
    padding:13px 14px; margin-bottom:9px; color:var(--ink); font-size:13.5px;
  }
  .excel-option .eo-icon{ font-size:18px; flex-shrink:0; }
  .excel-option .eo-text small{ display:block; color:var(--ink-dim); font-size:10.5px; font-family:var(--mono); margin-top:2px; font-weight:400; }
  .excel-cancel{
    width:100%; text-align:center; background:none; border:none; color:var(--ink-dim);
    font-family:var(--mono); font-size:12.5px; padding:10px; margin-top:4px;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-left">
      <div class="badge"></div>
      <div>
        <h1>NOTAS</h1>
        <div class="updated" id="updatedLabel">sin datos cargados</div>
      </div>
    </div>
    <button class="refresh-btn" onclick="openExcelModal()">⟳ Excel</button>
  </div>
  <div class="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9AA3B2" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="searchInput" placeholder="Buscar cliente, código, texto...">
  </div>
  <div class="maintabs">
    <div class="maintab active" data-tab="notas" onclick="setMainTab('notas')">📌 Notas</div>
    <div class="maintab" data-tab="info" onclick="setMainTab('info')">ℹ️ Información</div>
  </div>
  <div class="subtabs" id="subtabs" style="display:none;"></div>
</header>

<main>
  <div id="content"></div>
</main>

<button class="fab" onclick="openEditorForCurrentTab()">+</button>

<input type="file" id="fileInputLibreta" accept=".xlsx,.xls">
<input type="file" id="fileInputPropio" accept=".xlsx,.xls">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
/* ===================== ESTADO ===================== */
// Dos capas independientes:
// - LIBRETA: lo importado desde el Excel maestro de PycLibreta (base de solo lectura)
// - NOTAS_PROPIO: lo creado/editado aquí mismo, por id. Siempre gana sobre LIBRETA al fusionar.
var LIBRETA = { notas: [], info: [], updated: null };
var NOTAS_PROPIO = { notas: {}, info: {}, updated: null };
var STATE = { mainTab: 'notas', subEntidad: 'Todo', query: '' };

var LIBRETA_KEY = 'notasapp_v1_libreta';
var NOTASPROPIO_KEY = 'notasapp_v1_propio';
var ORDER_KEYS = { notas: 'notasapp_v1_order_notas', info: 'notasapp_v1_order_info' };

var ENTITY_MAP = {
  'BBVA':'ce-bbva',
  'CAJAMAR':'ce-cajamar',
  'CAIXA RURAL TORRENT':'ce-caixa','CAIXA':'ce-caixa','CAIXA TORRENT':'ce-caixa',
  'ORANGE':'ce-orange',
  'ABANCA':'ce-abanca',
  'REPSOL':'ce-repsol','CAMPSA':'ce-repsol',
  'SPRINTER':'ce-sprinter',
  'DIA':'ce-dia',
  'BANCA MARCH':'ce-march',
  'JD':'ce-jd'
};

/* ===================== UTILIDADES DE TEXTO ===================== */
function limpiarTexto(raw){
  if(raw === null || raw === undefined) return '';
  var s = String(raw);
  s = s.replace(/(_x000d_)+/gi, '\n');
  s = s.replace(/\\n/g, '\n');
  s = s.replace(/<\/(p|div|li|h[1-6])>/gi, '\n');
  s = s.replace(/<br\s*\/?>/gi, '\n');
  s = s.replace(/<li[^>]*>/gi, '• ');
  s = s.replace(/<[^>]+>/g, '');
  s = s.replace(/&nbsp;/gi, ' ')
       .replace(/&amp;/gi, '&')
       .replace(/&lt;/gi, '<')
       .replace(/&gt;/gi, '>')
       .replace(/&quot;/gi, '"')
       .replace(/&#39;/gi, "'");
  s = s.split('\n').map(function(l){ return l.replace(/\s+$/,''); }).join('\n');
  s = s.replace(/\n{3,}/g, '\n\n');
  s = s.replace(/[ \t]{2,}/g, ' ');
  return s.trim();
}

function excelFecha(val){
  if(val === null || val === undefined || val === '') return '';
  if(typeof val === 'number'){
    try{
      var d = XLSX.SSF.parse_date_code(val);
      if(d && d.y) return pad2(d.d) + '/' + pad2(d.m) + '/' + d.y;
    }catch(e){}
  }
  return String(val).trim();
}
function pad2(n){ n = String(n); return n.length < 2 ? '0'+n : n; }

function todayStr(){
  var d = new Date();
  return pad2(d.getDate()) + '/' + pad2(d.getMonth()+1) + '/' + d.getFullYear();
}

function fechaOrden(str){
  if(!str) return 0;
  var m = String(str).match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if(m){
    var d = +m[1], mo = +m[2], y = +m[3];
    if(y < 100) y += 2000;
    return new Date(y, mo-1, d).getTime();
  }
  return 0;
}

function splitEtiquetas(str){
  if(!str) return [];
  return String(str).split(/[\s,]+/).map(function(s){
    return s.replace(/^#/, '').trim();
  }).filter(Boolean);
}

function entityClass(entidad){
  if(!entidad) return '';
  var key = String(entidad).trim().toUpperCase();
  return ENTITY_MAP[key] || '';
}

function escapeHtml(str){
  var d = document.createElement('div');
  d.textContent = str == null ? '' : String(str);
  return d.innerHTML;
}

function generarId(kind){
  return (kind === 'notas' ? 'N_' : 'IT_') + Date.now();
}

/* ===================== LECTURA DE EXCEL ===================== */
var HEADER_SETS = {
  notas: ['ID','TITULO','TEXTO','FECHA','ETIQUETAS'],
  info:  ['ID','FECHA','ENTIDAD','CODIGO','POBLACION','SISTEMA','TIPO_DATO','INFORMACION','ETIQUETAS']
};

function encontrarFilaCabecera(rows, headerSet){
  var maxRow = Math.min(rows.length, 10);
  var best = -1, bestScore = 0;
  for(var i=0; i<maxRow; i++){
    var row = rows[i] || [];
    var score = 0;
    for(var j=0; j<row.length; j++){
      var v = row[j];
      if(v === null || v === undefined) continue;
      var vv = String(v).trim().toUpperCase();
      if(headerSet.indexOf(vv) !== -1) score++;
    }
    if(score > bestScore){ bestScore = score; best = i; }
  }
  return bestScore >= 2 ? best : -1;
}

function filasAObjetos(rows, headerRowIdx){
  var headerRow = rows[headerRowIdx];
  var headers = headerRow.map(function(h){ return h === null || h === undefined ? '' : String(h).trim().toUpperCase(); });
  var out = [];
  for(var i = headerRowIdx + 1; i < rows.length; i++){
    var row = rows[i];
    if(!row || row.length === 0) continue;
    var obj = {};
    var hasAny = false;
    for(var j=0; j<headers.length; j++){
      if(!headers[j]) continue;
      var val = row[j];
      if(val !== null && val !== undefined && String(val).trim() !== '') hasAny = true;
      obj[headers[j]] = val;
    }
    if(hasAny) out.push(obj);
  }
  return out;
}

function procesarLibro(workbook){
  var notas = [];
  var info = [];

  if(workbook.Sheets['Notas']){
    var rowsN = XLSX.utils.sheet_to_json(workbook.Sheets['Notas'], {header:1, raw:true, defval:null});
    var hIdxN = encontrarFilaCabecera(rowsN, HEADER_SETS.notas);
    if(hIdxN !== -1){
      var objsN = filasAObjetos(rowsN, hIdxN);
      notas = objsN.filter(function(o){ return o.ID; }).map(function(o){
        return {
          id: String(o.ID),
          titulo: limpiarTexto(o.TITULO || ''),
          texto: limpiarTexto(o.TEXTO || ''),
          fecha: excelFecha(o.FECHA),
          etiquetas: splitEtiquetas(o.ETIQUETAS)
        };
      });
    }
  }

  if(workbook.Sheets['Información'] || workbook.Sheets['Informacion']){
    var sheetInfo = workbook.Sheets['Información'] || workbook.Sheets['Informacion'];
    var rowsI = XLSX.utils.sheet_to_json(sheetInfo, {header:1, raw:true, defval:null});
    var hIdxI = encontrarFilaCabecera(rowsI, HEADER_SETS.info);
    if(hIdxI !== -1){
      var objsI = filasAObjetos(rowsI, hIdxI);
      info = objsI.filter(function(o){ return o.ID; }).map(function(o){
        return {
          id: String(o.ID),
          fecha: excelFecha(o.FECHA),
          entidad: (o.ENTIDAD || '').toString().trim(),
          codigo: (o.CODIGO === null || o.CODIGO === undefined) ? '' : String(o.CODIGO).trim(),
          poblacion: (o.POBLACION || '').toString().trim(),
          sistema: (o.SISTEMA || '').toString().trim(),
          tipoDato: limpiarTexto(o.TIPO_DATO || ''),
          informacion: limpiarTexto(o.INFORMACION || ''),
          etiquetas: splitEtiquetas(o.ETIQUETAS)
        };
      });
    }
  }

  notas.sort(function(a,b){ return fechaOrden(b.fecha) - fechaOrden(a.fecha); });
  info.sort(function(a,b){ return fechaOrden(b.fecha) - fechaOrden(a.fecha); });

  return { notas: notas, info: info, updated: new Date().toISOString() };
}

function procesarLibroPropio(workbook){
  var parsed = procesarLibro(workbook);
  var notasMap = {};
  parsed.notas.forEach(function(n){ notasMap[n.id] = n; });
  var infoMap = {};
  parsed.info.forEach(function(n){ infoMap[n.id] = n; });
  return { notas: notasMap, info: infoMap, updated: parsed.updated };
}

/* ===================== FUSIÓN DE CAPAS ===================== */
function getMerged(kind){
  var base = (kind === 'notas' ? LIBRETA.notas : LIBRETA.info) || [];
  var propio = (kind === 'notas' ? NOTAS_PROPIO.notas : NOTAS_PROPIO.info) || {};
  var map = {};
  base.forEach(function(it){ map[it.id] = it; });
  Object.keys(propio).forEach(function(id){ map[id] = propio[id]; });
  var list = Object.keys(map).map(function(id){ return map[id]; });
  list.sort(function(a,b){ return fechaOrden(b.fecha) - fechaOrden(a.fecha); });
  return list;
}
function esLocal(kind, id){
  var propio = (kind === 'notas' ? NOTAS_PROPIO.notas : NOTAS_PROPIO.info) || {};
  return Object.prototype.hasOwnProperty.call(propio, id);
}
function existeEnLibreta(kind, id){
  var base = (kind === 'notas' ? LIBRETA.notas : LIBRETA.info) || [];
  return base.some(function(it){ return it.id === id; });
}

/* ===================== CARGA / GUARDADO ===================== */
function saveLibreta(){
  try{ localStorage.setItem(LIBRETA_KEY, JSON.stringify(LIBRETA)); }catch(e){}
}
function saveNotasPropio(){
  try{ localStorage.setItem(NOTASPROPIO_KEY, JSON.stringify(NOTAS_PROPIO)); }catch(e){}
}
function cargarDesdeStorage(){
  try{
    var raw = localStorage.getItem(LIBRETA_KEY);
    if(raw) LIBRETA = JSON.parse(raw);
  }catch(e){}
  try{
    var raw2 = localStorage.getItem(NOTASPROPIO_KEY);
    if(raw2) NOTAS_PROPIO = JSON.parse(raw2);
  }catch(e){}
}

document.getElementById('fileInputLibreta').addEventListener('change', function(e){
  var file = e.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    try{
      var arr = new Uint8Array(ev.target.result);
      var wb = XLSX.read(arr, {type:'array', cellDates:false});
      LIBRETA = procesarLibro(wb);
      saveLibreta();
      STATE.subEntidad = 'Todo';
      closeExcelModal();
      render();
    }catch(err){
      alert('No se pudo leer el Excel: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
});

document.getElementById('fileInputPropio').addEventListener('change', function(e){
  var file = e.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){

});

function todayStamp(){
  var d = new Date();
  return d.getFullYear() + pad2(d.getMonth()+1) + pad2(d.getDate());
}

function exportarExcelPropio(){
  var notasArr = Object.keys(NOTAS_PROPIO.notas || {}).map(function(id){ return NOTAS_PROPIO.notas[id]; });
  var infoArr = Object.keys(NOTAS_PROPIO.info || {}).map(function(id){ return NOTAS_PROPIO.info[id]; });
  if(notasArr.length === 0 && infoArr.length === 0){
    alert('Todavía no tienes notas propias creadas o editadas.');
    return;
  }
  var wsNotasData = [['ID','TITULO','TEXTO','FECHA','ETIQUETAS']];
  notasArr.forEach(function(n){
    wsNotasData.push([n.id, n.titulo || '', n.texto || '', n.fecha || '', (n.etiquetas||[]).map(function(t){ return '#'+t; }).join(' ')]);
  });
  var wsInfoData = [['ID','FECHA','ENTIDAD','CODIGO','POBLACION','SISTEMA','TIPO_DATO','INFORMACION','ETIQUETAS']];
  infoArr.forEach(function(it){
    wsInfoData.push([it.id, it.fecha || '', it.entidad || '', it.codigo || '', it.poblacion || '', it.sistema || '', it.tipoDato || '', it.informacion || '', (it.etiquetas||[]).map(function(t){ return '#'+t; }).join(' ')]);
  });
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(wsNotasData), 'Notas');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(wsInfoData), 'Información');
  XLSX.writeFile(wb, 'notas_propio_' + todayStamp() + '.xlsx');
  closeExcelModal();
}

/* ===================== ORDEN MANUAL ===================== */
function loadOrder(kind){
  try{
    var raw = localStorage.getItem(ORDER_KEYS[kind]);
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}
function saveOrder(kind, ids){
  try{ localStorage.setItem(ORDER_KEYS[kind], JSON.stringify(ids)); }catch(e){}
}
function ordenarManual(kind, list){
  var order = loadOrder(kind);
  if(!order.length) return list.slice();
  var byId = {};
  list.forEach(function(n){ byId[n.id] = n; });
  var ordered = [];
  order.forEach(function(id){
    if(byId[id]){ ordered.push(byId[id]); delete byId[id]; }
  });
  var nuevos = list.filter(function(n){ return byId[n.id]; });
  return nuevos.concat(ordered);
}

function initDragReorder(kind){
  var handles = document.querySelectorAll('.drag-handle');
  handles.forEach(function(handle){
    handle.addEventListener('pointerdown', function(e){ onDragStart(e, kind); });
  });
}

function onDragStart(e, kind){
  e.preventDefault();
  var row = e.target.closest('.note-row');
  if(!row) return;
  var list = row.parentElement;
  var rect = row.getBoundingClientRect();
  var startY = e.clientY;
  var startTop = rect.top;

  var placeholder = document.createElement('div');
  placeholder.className = 'note-row-placeholder';
  placeholder.style.height = rect.height + 'px';
  list.insertBefore(placeholder, row.nextSibling);

  row.style.position = 'fixed';
  row.style.top = rect.top + 'px';
  row.style.left = rect.left + 'px';
  row.style.width = rect.width + 'px';
  row.style.zIndex = 200;
  row.classList.add('dragging');
  document.body.style.userSelect = 'none';

  function onMove(ev){
    var y = ev.clientY;
    row.style.top = (startTop + (y - startY)) + 'px';
    var rowRect = row.getBoundingClientRect();
    var rowCenter = rowRect.top + rowRect.height / 2;
    var siblings = Array.prototype.slice.call(list.children).filter(function(el){ return el !== row && el !== placeholder; });
    var target = null;
    for(var i=0; i<siblings.length; i++){
      var sr = siblings[i].getBoundingClientRect();
      if(rowCenter < sr.top + sr.height / 2){ target = siblings[i]; break; }
    }
    if(target){
      if(target !== placeholder.nextSibling) list.insertBefore(placeholder, target);
    } else {
      if(list.lastElementChild !== placeholder) list.appendChild(placeholder);
    }
  }

  function onUp(){
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    row.style.position = '';
    row.style.top = '';
    row.style.left = '';
    row.style.width = '';
    row.style.zIndex = '';
    row.classList.remove('dragging');
    document.body.style.userSelect = '';
    list.insertBefore(row, placeholder);
    placeholder.remove();

    var visibleIds = Array.prototype.slice.call(list.children).map(function(el){ return el.dataset.id; });
    var fullOrder = loadOrder(kind);
    if(!fullOrder.length){
      fullOrder = getMerged(kind).map(function(n){ return String(n.id); });
    }
    var indices = [];
    visibleIds.forEach(function(id){
      var idx = fullOrder.indexOf(id);
      if(idx !== -1) indices.push(idx);
    });
    var insertPos = indices.length ? Math.min.apply(null, indices) : fullOrder.length;
    fullOrder = fullOrder.filter(function(id){ return visibleIds.indexOf(id) === -1; });
    if(insertPos > fullOrder.length) insertPos = fullOrder.length;
    var args = [insertPos, 0].concat(visibleIds);
    Array.prototype.splice.apply(fullOrder, args);
    saveOrder(kind, fullOrder);
  }

  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}

/* ===================== RENDER ===================== */
function setMainTab(tab){
  STATE.mainTab = tab;
  STATE.subEntidad = 'Todo';
  document.querySelectorAll('.maintab').forEach(function(el){
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  render();
}

document.getElementById('searchInput').addEventListener('input', function(e){
  STATE.query = e.target.value.trim().toLowerCase();
  render();
});

function formatUpdated(){
  var l = LIBRETA.updated, p = NOTAS_PROPIO.updated;
  if(!l && !p) return 'sin datos cargados';
  var latest = (l && p) ? (new Date(l) > new Date(p) ? l : p) : (l || p);
  var d = new Date(latest);
  return 'Actualizado ' + pad2(d.getDate()) + '/' + pad2(d.getMonth()+1) + '/' + d.getFullYear() + ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
}

function renderSubtabs(){
  var subtabsEl = document.getElementById('subtabs');
  if(STATE.mainTab !== 'info'){
    subtabsEl.style.display = 'none';
    subtabsEl.innerHTML = '';
    return;
  }
  var entidades = {};
  getMerged('info').forEach(function(o){
    var e = (o.entidad || '').trim();
    if(e) entidades[e] = true;
  });
  var lista = Object.keys(entidades).sort();
  if(lista.length === 0){
    subtabsEl.style.display = 'none';
    return;
  }
  subtabsEl.style.display = 'flex';
  var html = '<div class="subtab' + (STATE.subEntidad==='Todo'?' active':'') + '" onclick="setSubTab(\'Todo\')">Todo</div>';
  lista.forEach(function(e){
    html += '<div class="subtab' + (STATE.subEntidad===e?' active':'') + '" onclick="setSubTab(' + JSON.stringify(e).replace(/"/g,'&quot;') + ')">' + escapeHtml(e) + '</div>';
  });
  subtabsEl.innerHTML = html;
}

function setSubTab(e){
  STATE.subEntidad = e;
  render();
}

function matchQuery(fields){
  if(!STATE.query) return true;
  var q = STATE.query;
  return fields.some(function(f){
    return f && String(f).toLowerCase().indexOf(q) !== -1;
  });
}

function cardHtml(kind, item){
  var cls = kind === 'info' ? entityClass(item.entidad) : '';
  var local = esLocal(kind, item.id);
  var titleLine, headLine, bodyText, dateStr, chips;

  if(kind === 'notas'){
    titleLine = item.titulo || '(sin título)';
    headLine = '';
    bodyText = item.texto;
    dateStr = item.fecha;
    chips = item.etiquetas;
  } else {
    var headParts = [];
    if(item.entidad) headParts.push(item.entidad.toUpperCase());
    titleLine = [item.poblacion, item.tipoDato].filter(Boolean).join(' · ') || item.tipoDato || '(sin título)';
    headLine = headParts.join(' ');
    bodyText = item.informacion;
    dateStr = item.fecha;
    chips = item.etiquetas;
    if(item.sistema) chips = [item.sistema].concat(chips);
  }

  var bodyEsc = escapeHtml(bodyText || '');
  var cid = kind + '-' + item.id;

  var head = '';
  if(kind === 'info'){
    head = '<div class="head">' +
      (item.entidad ? '<span class="ent">' + escapeHtml(item.entidad.toUpperCase()) + '</span>' : '<span class="ent" style="color:var(--ink-dim)">SIN ENTIDAD</span>') +
      (item.codigo ? '<span class="code">' + escapeHtml(item.codigo) + '</span>' : '') +
      '</div>';
  }

  var out = '<div class="card ' + cls + '" data-cid="' + cid + '" onclick="openFullView(' + JSON.stringify(cid).replace(/"/g,'&quot;') + ')">';
  out += head;
  out += '<p class="title">' + escapeHtml(titleLine) + (local ? ' <span class="local-badge">✎</span>' : '') + '</p>';
  out += '<div class="body" id="body-' + cid + '">' + bodyEsc + '</div>';
  out += '<div class="meta"><span class="date">' + escapeHtml(dateStr || '') + '</span>';
  if(chips && chips.length){
    out += '<span class="chips">' + chips.slice(0,3).map(function(c){ return '<span class="chip">#' + escapeHtml(c) + '</span>'; }).join('') + '</span>';
  }
  out += '</div></div>';
  return out;
}

var CARD_STORE = {};

function openFullView(cid){
  var item = CARD_STORE[cid];
  if(!item) return;

  var chipsHtml = (item.chips && item.chips.length)
    ? '<div class="fv-meta">' + item.chips.map(function(c){ return '<span class="fv-chip">#' + escapeHtml(c) + '</span>'; }).join('') + '</div>'
    : '';

  var headTextHtml = item.ent
    ? '<div class="fv-headtext"><div class="fv-ent">' + escapeHtml(item.ent) + '</div>' + (item.sub ? '<div class="fv-sub">' + escapeHtml(item.sub) + '</div>' : '') + '</div>'
    : (item.sub ? '<div class="fv-headtext"><div class="fv-sub">' + escapeHtml(item.sub) + '</div></div>' : '');

  var pencilBtn = '<button class="fv-pencil" onclick="closeFullViewThenEdit(' + JSON.stringify(cid).replace(/"/g,'&quot;') + ')">✎</button>';
  var trashBtn = item.isLocal
    ? '<button class="fv-pencil" style="margin-left:8px;" onclick="eliminarItem(' + JSON.stringify(item.kind).replace(/"/g,'&quot;') + ',' + JSON.stringify(item.id).replace(/"/g,'&quot;') + ')">🗑</button>'
    : '';

  var fv = document.createElement('div');
  fv.className = 'fullview';
  fv.innerHTML =
    '<div class="fv-header"><button class="fv-back" onclick="this.closest(\'.fullview\').remove()">←</button>' + headTextHtml + pencilBtn + trashBtn + '</div>' +
    '<div class="fv-scroll">' +
      '<h2 class="fv-title">' + escapeHtml(item.title) + '</h2>' +
      '<div class="fv-body">' + escapeHtml(item.body) + '</div>' +
      (item.date ? '<div class="fv-date">' + escapeHtml(item.date) + '</div>' : '') +
      chipsHtml +
    '</div>';
  document.body.appendChild(fv);
}

function closeFullViewThenEdit(cid){
  var el = document.querySelector('.fullview');
  if(el) el.remove();
  var item = CARD_STORE[cid];
  if(!item) return;
  openEditor(item.kind, item.raw);
}

/* ===================== CREAR / EDITAR ===================== */
function field(id, label, type, value){
  var v = escapeHtml(value || '');
  if(type === 'textarea'){
    return '<div class="editor-field"><label class="editor-label">' + label + '</label><textarea class="editor-textarea" id="' + id + '">' + v + '</textarea></div>';
  }
  return '<div class="editor-field"><label class="editor-label">' + label + '</label><input class="editor-input" id="' + id + '" value="' + v + '"></div>';
}

function openEditorForCurrentTab(){
  openEditor(STATE.mainTab, null);
}

function openEditor(kind, existing){
  var isNew = !existing;
  var item = existing || null;

  var fieldsHtml = '';
  if(kind === 'notas'){
    fieldsHtml =
      field('ed-titulo','Título', 'input', item ? item.titulo : '') +
      field('ed-texto','Texto', 'textarea', item ? item.texto : '') +
      field('ed-etiquetas','Etiquetas (separadas por espacio)', 'input', item ? item.etiquetas.join(' ') : '') +
      field('ed-fecha','Fecha', 'input', item ? item.fecha : todayStr());
  } else {
    fieldsHtml =
      field('ed-entidad','Entidad', 'input', item ? item.entidad : '') +
      field('ed-codigo','Código', 'input', item ? item.codigo : '') +
      field('ed-poblacion','Población', 'input', item ? item.poblacion : '') +
      field('ed-sistema','Sistema', 'input', item ? item.sistema : '') +
      field('ed-tipoDato','Tipo de dato', 'input', item ? item.tipoDato : '') +
      field('ed-informacion','Información', 'textarea', item ? item.informacion : '') +
      field('ed-etiquetas','Etiquetas (separadas por espacio)', 'input', item ? item.etiquetas.join(' ') : '') +
      field('ed-fecha','Fecha', 'input', item ? item.fecha : todayStr());
  }

  var headerLabel = isNew ? ('NUEVA ' + (kind === 'notas' ? 'NOTA' : 'INFORMACIÓN')) : 'EDITAR';
  var existingId = isNew ? '' : existing.id;

  var fv = document.createElement('div');
  fv.className = 'fullview';
  fv.id = 'editorView';
  fv.innerHTML =
    '<div class="fv-header"><button class="fv-back" onclick="this.closest(\'.fullview\').remove()">←</button>' +
      '<div class="fv-headtext"><div class="fv-ent">' + escapeHtml(headerLabel) + '</div></div>' +
    '</div>' +
    '<div class="fv-scroll">' +
      fieldsHtml +
      '<div class="editor-actions">' +
        '<button class="editor-cancel-btn" onclick="this.closest(\'.fullview\').remove()">Cancelar</button>' +
        '<button class="editor-save" onclick="guardarEditor(' + JSON.stringify(kind).replace(/"/g,'&quot;') + ',' + JSON.stringify(existingId).replace(/"/g,'&quot;') + ')">Guardar</button>' +
      '</div>' +
      (existingId ? ('<button class="editor-delete" onclick="eliminarItem(' + JSON.stringify(kind).replace(/"/g,'&quot;') + ',' + JSON.stringify(existingId).replace(/"/g,'&quot;') + ')">🗑 Eliminar</button>') : '') +
    '</div>';
  document.body.appendChild(fv);
}

function eliminarItem(kind, id){
  var enLibreta = existeEnLibreta(kind, id);
  var msg = enLibreta
    ? 'Esta nota también existe en el Excel de Libreta. Se eliminará tu versión local y se volverá a mostrar la original de Libreta. ¿Continuar?'
    : '¿Eliminar esta nota? No se puede deshacer.';
  if(!confirm(msg)) return;

  var propio = (kind === 'notas' ? NOTAS_PROPIO.notas : NOTAS_PROPIO.info);
  if(propio && Object.prototype.hasOwnProperty.call(propio, id)) delete propio[id];
  NOTAS_PROPIO.updated = new Date().toISOString();
  saveNotasPropio();

  document.querySelectorAll('.fullview').forEach(function(el){ el.remove(); });
  render();
}

function guardarEditor(kind, existingId){
  var val = function(id){ var el = document.getElementById(id); return el ? el.value.trim() : ''; };
  var etiquetas = splitEtiquetas(val('ed-etiquetas'));
  var id = existingId || generarId(kind);
  var item;

  if(kind === 'notas'){
    item = {
      id: id,
      titulo: val('ed-titulo'),
      texto: val('ed-texto'),
      fecha: val('ed-fecha') || todayStr(),
      etiquetas: etiquetas
    };
    if(!item.titulo && !item.texto){ alert('Escribe al menos un título o un texto.'); return; }
    NOTAS_PROPIO.notas[id] = item;
  } else {
    item = {
      id: id,
      fecha: val('ed-fecha') || todayStr(),
      entidad: val('ed-entidad'),
      codigo: val('ed-codigo'),
      poblacion: val('ed-poblacion'),
      sistema: val('ed-sistema'),
      tipoDato: val('ed-tipoDato'),
      informacion: val('ed-informacion'),
      etiquetas: etiquetas
    };
    var infoVacia = !item.entidad && !item.codigo && !item.poblacion && !item.sistema && !item.tipoDato && !item.informacion;
    if(infoVacia){ alert('Rellena al menos un campo antes de guardar.'); return; }
    NOTAS_PROPIO.info[id] = item;
  }

  NOTAS_PROPIO.updated = new Date().toISOString();
  saveNotasPropio();

  var el = document.getElementById('editorView');
  if(el) el.remove();
  render();
}

/* ===================== RENDER PRINCIPAL ===================== */
function render(){
  document.getElementById('updatedLabel').textContent = formatUpdated();
  renderSubtabs();

  var contentEl = document.getElementById('content');
  var totalItems = getMerged('notas').length + getMerged('info').length;

  if(totalItems === 0){
    contentEl.innerHTML =
      '<div class="empty">' +
      '<div class="icon">🗒️</div>' +
      '<h2>Sin datos cargados</h2>' +
      '<p>Importa el Excel de PycLibreta (hojas "Notas" e "Información")<br>o crea tu primera nota con el botón +.</p>' +
      '<button class="bigbtn" onclick="openExcelModal()">Abrir Excel</button>' +
      '</div>';
    return;
  }

  CARD_STORE = {};
  var items, kind;
  var reorderActive = false;
  if(STATE.mainTab === 'notas'){
    kind = 'notas';
    items = getMerged('notas').filter(function(n){
      return matchQuery([n.titulo, n.texto, n.etiquetas.join(' ')]);
    });
    if(!STATE.query){
      items = ordenarManual('notas', items);
      reorderActive = items.length > 1;
    }
  } else {
    kind = 'info';
    items = getMerged('info').filter(function(n){
      if(STATE.subEntidad !== 'Todo' && (n.entidad || '') !== STATE.subEntidad) return false;
      return matchQuery([n.entidad, n.codigo, n.poblacion, n.sistema, n.tipoDato, n.informacion, n.etiquetas.join(' ')]);
    });
    items = ordenarManual('info', items);
    reorderActive = (!STATE.query && items.length > 1);
  }

  if(items.length === 0){
    contentEl.innerHTML = '<div class="no-results">Sin resultados para esta búsqueda.</div>';
    return;
  }

  var html = '<div class="notas-list">';
  items.forEach(function(item){
    var cid = kind + '-' + item.id;
    var local = esLocal(kind, item.id);
    if(kind === 'notas'){
      CARD_STORE[cid] = {
        kind: kind, id: item.id, raw: item, isLocal: local,
        title: item.titulo || '(sin título)',
        body: item.texto,
        ent: '', sub: '',
        date: item.fecha,
        chips: item.etiquetas
      };
    } else {
      var chips = item.sistema ? [item.sistema].concat(item.etiquetas) : item.etiquetas;
      CARD_STORE[cid] = {
        kind: kind, id: item.id, raw: item, isLocal: local,
        title: [item.poblacion, item.tipoDato].filter(Boolean).join(' · ') || item.tipoDato || '(sin título)',
        body: item.informacion,
        ent: item.entidad ? item.entidad.toUpperCase() : '',
        sub: item.codigo || '',
        date: item.fecha,
        chips: chips
      };
    }
    html += '<div class="note-row" data-id="' + escapeHtml(String(item.id)) + '">';
    if(reorderActive) html += '<div class="drag-handle">⠿</div>';
    html += cardHtml(kind, item);
    html += '</div>';
  });
  html += '</div>';
  contentEl.innerHTML = html;

  if(reorderActive) initDragReorder(kind);
}

/* ===================== INIT ===================== */
cargarDesdeStorage();
render();

if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
